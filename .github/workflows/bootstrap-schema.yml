name: bootstrap-schema

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-bootstrap-instances:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.27"
      - run: uv run --project cli python -m governance.schema_check docs/designs/governance-bootstrap/
