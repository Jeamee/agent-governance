schema_version: 2
task_id: GOV-CLI-M1
requirements:
  - id: ACC-CLI-001
    kind: behavior
    preconditions: deterministic inputs are identical
    action: run local and ci modes
    expected: deterministic conclusions match and ci fails unverifiable results
    forbidden: ci treats unverifiable as pass
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-SCHEMA-001
    kind: behavior
    preconditions: a manifest is structurally invalid
    action: run schema validation
    expected: the invalid structure fails
    forbidden: invalid manifest passes
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-AUTH-001
    kind: behavior
    preconditions: delivery ref differs from authorization
    action: run authorization validation
    expected: validation fails
    forbidden: delivery declaration becomes authoritative
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-AUTH-002
    kind: behavior
    preconditions: authorization is introduced by delivery diff
    action: run authorization validation
    expected: validation fails
    forbidden: self authorization passes
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-AUTH-003
    kind: behavior
    preconditions: a protected revocation record exists
    action: run authorization validation
    expected: new delivery fails
    forbidden: revoked authorization passes
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-AUTH-004
    kind: behavior
    preconditions: revocation edge cases exist
    action: run authorization validation
    expected: all revocation boundaries fail closed
    forbidden: automatic replacement or same-PR revocation authority
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-ACC-001
    kind: behavior
    preconditions: required verifier output is missing
    action: run acceptance validation
    expected: failure names missing id, source and reproduction
    forbidden: missing verifier passes
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-ACC-002
    kind: behavior
    preconditions: report is missing, early, or lacks a shard
    action: run acceptance validation
    expected: failure
    forbidden: incomplete report passes
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-ACC-003
    kind: behavior
    preconditions: a browser result retried
    action: parse the report
    expected: attempts are preserved
    forbidden: retry history is lost
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-ACC-004
    kind: behavior
    preconditions: high-risk instances are incomplete
    action: run acceptance validation
    expected: failure
    forbidden: partial instances pass
    required_verifiers: [{ type: test, id: TEST-M1-SUITE }]
  - id: ACC-PLAN-001
    kind: behavior
